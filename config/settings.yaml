# 政策数据源配置
policy_sources:
  # 国务院
  gov_cn:
    name: "中国政府网"
    url: "http://www.gov.cn/zhengce/zhengceku/"
    priority: 1
  
  # 各部委 RSS/网站
  ministries:
    - name: "国家发改委"
      url: "https://www.ndrc.gov.cn/xxgk/"
      rss: null
      priority: 1
    - name: "工信部"
      url: "https://www.miit.gov.cn/zwgk/zcwj/"
      rss: null
      priority: 1
    - name: "商务部"
      url: "https://www.mofcom.gov.cn/article/b/"
      rss: null
      priority: 1
    - name: "农业农村部"
      url: "http://www.moa.gov.cn/gk/zcfg/"
      rss: null
      priority: 1
    - name: "生态环境部"
      url: "https://www.mee.gov.cn/xxgk2018/xxgk/xxgk15/"
      rss: null
      priority: 2
    - name: "国家能源局"
      url: "https://www.nea.gov.cn/xxgk/"
      rss: null
      priority: 2
    - name: "中国人民银行"
      url: "http://www.pbc.gov.cn/zhengcehuobisi/"
      rss: null
      priority: 1
    - name: "海关总署"
      url: "http://www.customs.gov.cn/customs/302249/"
      rss: null
      priority: 2

# 搜索配置（Brave Search）
search:
  brave_api_key: ""  # 请从环境变量 BRAVE_API_KEY 读取，或手动填入
  brave_base_url: "https://api.search.brave.com/res/v1/web/search"

# 数据采集配置
data_collection:
  policy_check_interval_minutes: 30
  fundamental_update_time: "09:00"  # 每日基本面数据更新时间
  market_data_interval_minutes: 5
  
# 信号生成阈值
signal_thresholds:
  min_confidence: 0.7           # 最低置信度
  min_policy_relevance: 0.6     # 最低政策相关度
  min_fundamental_score: 0.6    # 最低基本面得分
  max_holding_days: 30          # 最大持仓周期

# 日内T+0交易配置
intraday:
  scan_time: "09:05"            # 开盘扫描时间
  close_time: "14:55"           # 平仓时间
  review_time: "19:00"          # 复盘时间
  min_confidence: 7             # 最低置信度（0-10）
  max_trades_per_day: 3         # 每日最大交易次数
  default_focus: ['A', 'AG', 'AL', 'AO', 'AP', 'AU', 'B', 'BC', 'BR', 'BU', 'C', 'CF', 'CJ', 'CS', 'CU', 'CY', 'EB', 'EG', 'FG', 'FU', 'HC', 'I', 'IC', 'IF', 'IH', 'IM', 'J', 'JD', 'JM', 'L', 'LC', 'LH', 'LU', 'M', 'MA', 'NI', 'NR', 'OI', 'P', 'PB', 'PF', 'PG', 'PK', 'PP', 'PX', 'RB', 'RM', 'RR', 'RU', 'SA', 'SC', 'SF', 'SH', 'SI', 'SM', 'SN', 'SP', 'SR', 'SS', 'T', 'TA', 'TL', 'UR', 'V', 'Y', 'ZN']  # 默认扫描品种
  trading_days: ["monday", "tuesday", "wednesday", "thursday", "friday"]

# 行情数据源
market_data:
  source: "sina"
  base_url: "http://hq.sinajs.cn/list={code}"
  encoding: "gbk"

# 分钟线数据配置 (AKShare)
minute_data:
  source: "akshare"
  period: "1"                      # 1分钟线
  entry_time: "09:05"
  exit_time: "14:55"
  day_session_start: "09:00"
  day_session_end: "15:00"
  # 品种代码映射: 系统代码 -> AKShare symbol
  # 默认规则为 commodity + '0'，如有特殊映射可在此覆盖
  symbol_map:
    RB: "RB0"
    SC: "SC0"
    M: "M0"
    CU: "CU0"
    I: "I0"
    AL: "AL0"
    AU: "AU0"

# 报告配置
reporting:
  daily_report_time: "08:30"
  output_format: "markdown"
  save_path: "reports/daily"
